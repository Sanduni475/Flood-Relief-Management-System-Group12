<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-primary p-2">
  <span class="navbar-brand">My Relief Requests</span>
  <a href="user_dashboard.html" class="btn btn-light btn-sm">Back</a>
</nav>

<div class="container mt-4">
  <h4 class="page-title mb-3">My Relief Requests</h4>

  <div class="content-card">
    <table class="table table-bordered table-striped">
      <thead>
        <tr>
          <th>Relief Type</th>
          <th>District</th>
          <th>Severity</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>Food</td>
          <td>Colombo</td>
          <td><span class="badge bg-danger">High</span></td>
          <td>
            <a href="edit_request.html" class="btn btn-warning btn-sm">Edit</a>
            <button class="btn btn-danger btn-sm">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
