<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Relief System - Admin Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow auth-card-login">
            <h4 class="text-center mb-3">Admin Login</h4>
            <form id="admin-login-form" onsubmit="handleAdminLogin(event)">
                <input type="email" name="email" class="form-control mb-3" placeholder="Admin Email" required>
                <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
                <button type="submit" class="btn btn-primary w-100">Login as Admin</button>
            </form>
            <p class="text-center mt-3">
                <a href="admin_register.html">Register as Admin</a>
            </p>
            <hr>
            <p class="text-center">
                <a href="index.html" class="text-muted">Back to Affected Login</a>
            </p>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
