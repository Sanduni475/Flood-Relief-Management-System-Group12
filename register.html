<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Relief System - Register</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow auth-card-register">
            <h4 class="text-center">Affected Person Registration</h4>
            <form id="register-form" onsubmit="handleRegister(event)">
                <input type="text" name="full_name" class="form-control mb-2" placeholder="Full Name" required>
                <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
                <input class="form-control mb-3" name="password" type="password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
            <p class="text-center mt-3">
                <a href="index.html" class="text-muted">Back to Login</a>
            </p>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
