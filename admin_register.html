<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Relief – Admin Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow auth-card-register">

    <h4 class="text-center mb-3">Admin Registration</h4>

    <form method="post" action="#">
      <input type="text" name="full_name" class="form-control mb-2" placeholder="Full Name" required>
      <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
      <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

      <button type="submit" class="btn btn-primary w-100">
        Register
      </button>
    </form>

    <hr>

    <p class="text-center">
      <a href="admin_login.html" class="text-muted">
        Back to Admin Login
      </a>
    </p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
