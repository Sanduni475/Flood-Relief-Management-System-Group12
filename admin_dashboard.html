<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Relief System - Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark px-4 py-3">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
            <i class="bi bi-shield-check fs-4"></i>
            <span>Flood Relief Admin</span>
        </a>
        <div class="ms-auto d-flex gap-3">
            <a href="users.html" class="btn btn-outline-light d-flex align-items-center gap-2">
                <i class="bi bi-people"></i> Users
            </a>
            <a href="reports.html" class="btn btn-outline-light d-flex align-items-center gap-2">
                <i class="bi bi-file-earmark-bar-graph"></i> Reports
            </a>
            <button onclick="logout()" class="btn btn-danger d-flex align-items-center gap-2">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4">
        <h2 class="page-title mb-4">Dashboard Overview</h2>

        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="card stat-card p-4 h-100 border-0 shadow-sm">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted text-uppercase mb-2">Total Users</h6>
                            <h3 id="stat-total-users" class="display-5 fw-bold mb-0">0</h3>
                        </div>
                        <div class="icon-box bg-primary bg-opacity-10 text-primary rounded-circle p-3">
                            <i class="bi bi-people-fill fs-3"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card stat-card p-4 h-100 border-0 shadow-sm">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted text-uppercase mb-2">High Severity</h6>
                            <h3 id="stat-high-severity" class="display-5 fw-bold mb-0 text-danger">0</h3>
                        </div>
                        <div class="icon-box bg-danger bg-opacity-10 text-danger rounded-circle p-3">
                            <i class="bi bi-exclamation-triangle-fill fs-3"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card stat-card p-4 h-100 border-0 shadow-sm">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted text-uppercase mb-2">Total Requests</h6>
                            <h3 id="stat-total-requests" class="display-5 fw-bold mb-0 text-success">0</h3>
                        </div>
                        <div class="icon-box bg-success bg-opacity-10 text-success rounded-circle p-3">
                            <i class="bi bi-inbox-fill fs-3"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold m-0"><i class="bi bi-clock-history me-2"></i>Recent Requests</h5>
                <a href="reports.html" class="btn btn-sm btn-link text-decoration-none">View All</a>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="bg-light">
                        <tr>
                            <th>ID</th>
                            <th>District</th>
                            <th>Severity</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="admin-recent-requests-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/admin.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", loadAdminDashboard);
    </script>
</body>

</html>
