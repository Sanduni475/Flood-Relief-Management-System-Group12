<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Relief Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-3">
  <span class="navbar-brand">Create Relief Request</span>
  <a href="user_dashboard.html" class="btn btn-light btn-sm">Back</a>
</nav>

<div class="container mt-4">

  <h4 class="page-title mb-3">Create Relief Request</h4>

  <div class="content-card">

    <form method="post" action="#">

      <label>Type of Relief</label>
      <select class="form-control mb-3" required>
        <option value="">Select</option>
        <option>Food</option>
        <option>Water</option>
        <option>Medicine</option>
        <option>Shelter</option>
      </select>

      <label>District</label>
      <select class="form-control mb-3" required>
        <option value="" disabled selected>Select</option>
        <option>Ampara</option>
        <option>Anuradhapura</option>
        <option>Badulla</option>
        <option>Batticaloa</option>
        <option>Colombo</option>
        <option>Galle</option>
        <option>Gampaha</option>
        <option>Hambantota</option>
        <option>Jaffna</option>
        <option>Kalutara</option>
        <option>Kandy</option>
        <option>Kegalle</option>
        <option>Kilinochchi</option>
        <option>Kurunegala</option>
        <option>Mannar</option>
        <option>Matale</option>
        <option>Matara</option>
        <option>Monaragala</option>
        <option>Mullaitivu</option>
        <option>Nuwara Eliya</option>
        <option>Polonnaruwa</option>
        <option>Puttalam</option>
        <option>Ratnapura</option>
        <option>Trincomalee</option>
        <option>Vavuniya</option>
      </select>

      <label>Divisional Secretariat</label>
      <input type="text" class="form-control mb-3" required>

      <label>GN Division</label>
      <input type="text" class="form-control mb-3" required>

      <label>Contact Person</label>
      <input type="text" class="form-control mb-3" required>

      <label>Contact Number</label>
      <input type="tel" class="form-control mb-3" required>

      <label>Address</label>
      <textarea class="form-control mb-3" rows="3" required></textarea>

      <label>Number of Family Members</label>
      <input type="number" class="form-control mb-3" min="1" required>

      <label>Flood Severity</label>
      <select class="form-control mb-3" required>
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>

      <label>Description / Special Needs</label>
      <textarea class="form-control mb-4" rows="3"></textarea>

      <button type="submit" class="btn btn-primary w-100">Submit Request</button>

    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
