<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Relief System - Edit Request</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>
    <nav class="navbar navbar-dark bg-primary px-3">
        <span class="navbar-brand">Edit Relief Request</span>
        <a href="my_requests.html" class="btn btn-light btn-sm">Back</a>
    </nav>
    <div class="container mt-4">
        <h4 class="page-title mb-3">Edit Relief Request</h4>
        <div class="content-card">
            <form id="edit-request-form" onsubmit="handleUpdateRequest(event)">
                <input type="hidden" name="relief_id" id="edit-relief-id">
                <label>Type of Relief</label>
                <select name="type" id="edit-type" class="form-control mb-3" required>
                    <option>Food</option>
                    <option>Water</option>
                    <option>Medicine</option>
                    <option>Shelter</option>
                </select>
                <label>District</label>
                <select name="district" id="edit-district" class="form-control mb-3" required>
                    <option>Ampara</option>
                    <option>Anuradhapura</option>
                    <option>Badulla</option>
                    <option>Batticaloa</option>
                    <option>Colombo</option>
                    <option>Galle</option>
                    <option>Gampaha</option>
                    <option>Hambantota</option>
                    <option>Jaffna</option>
                    <option>Kalutara</option>
                    <option>Kandy</option>
                    <option>Kegalle</option>
                    <option>Kilinochchi</option>
                    <option>Kurunegala</option>
                    <option>Mannar</option>
                    <option>Matale</option>
                    <option>Matara</option>
                    <option>Monaragala</option>
                    <option>Mullaitivu</option>
                    <option>Nuwara Eliya</option>
                    <option>Polonnaruwa</option>
                    <option>Puttalam</option>
                    <option>Ratnapura</option>
                    <option>Trincomalee</option>
                    <option>Vavuniya</option>
                </select>
                <label>Divisional Secretariat</label>
                <input type="text" name="div_sec" id="edit-div-sec" class="form-control mb-3" required>
                <label>GN Division</label>
                <input type="text" name="gn_div" id="edit-gn-div" class="form-control mb-3" required>
                <label>Contact Person</label>
                <input type="text" name="contact_person" id="edit-contact-person" class="form-control mb-3" required>
                <label>Contact Number</label>
                <input type="tel" name="contact_number" id="edit-contact-number" class="form-control mb-3" required>
                <label>Address</label>
                <textarea name="address" id="edit-address" class="form-control mb-3" rows="3" required></textarea>
                <label>Number of Family Members</label>
                <input type="number" name="family_members" id="edit-family-members" class="form-control mb-3" min="1"
                    required>
                <label>Flood Severity</label>
                <select name="severity" id="edit-severity" class="form-control mb-3" required>
                    <option>Low</option>
                    <option>Medium</option>
                    <option>High</option>
                </select>
                <label>Description / Special Needs</label>
                <textarea name="description" id="edit-description" class="form-control mb-4" rows="3"></textarea>
                <button type="submit" class="btn btn-primary w-100">Update Request</button>
            </form>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/user.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", loadEditForm);
    </script>
</body>

</html>
