<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Relief System - User Details</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>
    <nav class="navbar navbar-dark bg-primary p-2">
        <span class="navbar-brand">Admin – User & Relief Details</span>
        <a href="users.html" class="btn btn-light btn-sm">Back to Users</a>
    </nav>
    <div class="container mt-4">
        <h4 class="page-title">Affected Person Details</h4>
        <div id="user-info-card" class="content-card mb-4">
        </div>
        <h4 class="page-title">Relief Requests by This User</h4>
        <div class="content-card">
            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>Relief Type</th>
                        <th>DS Division</th>
                        <th>GN Division</th>
                        <th>Family Members</th>
                        <th>Severity</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody id="user-details-requests-body">
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/admin.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", loadUserDetails);
    </script>
</body>

</html>
